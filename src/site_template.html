<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fence Decisions</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <main class="max-w-5xl mx-auto px-6 py-10">
      <header class="mb-8">
        <h1 class="text-3xl font-semibold tracking-tight">Fence Decisions</h1>
        <p class="text-slate-600 mt-2">
          A timeline of architectural and product decisions captured with Fence.
        </p>
      </header>

      <section class="mb-8 space-y-4">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <div class="flex-1">
            <label class="text-sm text-slate-600">Search</label>
            <input
              id="searchInput"
              type="text"
              placeholder="Search by message, author, or tag"
              class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
            />
          </div>
          <div class="flex flex-wrap gap-2">
            <button data-category="All" class="category-pill bg-slate-900 text-white">All</button>
            <button data-category="Architecture" class="category-pill bg-blue-600 text-white">Architecture</button>
            <button data-category="Technical" class="category-pill bg-emerald-600 text-white">Technical</button>
            <button data-category="Product" class="category-pill bg-amber-500 text-white">Product</button>
            <button data-category="Security" class="category-pill bg-red-600 text-white">Security</button>
            <button data-category="General" class="category-pill bg-slate-500 text-white">General</button>
          </div>
        </div>
        <div id="activeFilters" class="text-sm text-slate-500"></div>
      </section>

      <section class="relative">
        <div class="absolute left-5 top-0 h-full w-px bg-slate-200"></div>
        <div id="timeline" class="space-y-6"></div>
      </section>

      <footer class="mt-12 text-center text-sm text-slate-500">
        Generated by Fence.
        <a
          class="text-slate-700 underline underline-offset-4"
          href="https://github.com/"
          target="_blank"
          rel="noreferrer"
        >
          Repo
        </a>
      </footer>
    </main>

    <script>
      const decisions = __FENCE_DATA__;

      const categoryClasses = {
        Architecture: "bg-blue-100 text-blue-700",
        Technical: "bg-emerald-100 text-emerald-700",
        Product: "bg-amber-100 text-amber-700",
        Security: "bg-red-100 text-red-700",
        General: "bg-slate-200 text-slate-700",
      };

      const searchInput = document.getElementById("searchInput");
      const timeline = document.getElementById("timeline");
      const categoryButtons = document.querySelectorAll(".category-pill");
      const activeFilters = document.getElementById("activeFilters");

      let activeCategory = "All";
      let activeTag = null;

      const normalize = (value) => value.toLowerCase();

      const matchesFilters = (decision) => {
        const searchTerm = normalize(searchInput.value || "");
        const searchable = [
          decision.message,
          decision.author,
          decision.timestamp,
          ...(decision.optional_tags || []),
        ]
          .join(" ")
          .toLowerCase();

        const matchesSearch = !searchTerm || searchable.includes(searchTerm);
        const matchesCategory =
          activeCategory === "All" || decision.category === activeCategory;
        const matchesTag = !activeTag || (decision.optional_tags || []).includes(activeTag);

        return matchesSearch && matchesCategory && matchesTag;
      };

      const renderTags = (tags) => {
        if (!tags || tags.length === 0) {
          return '<span class="text-xs text-slate-400">No tags</span>';
        }
        return tags
          .map(
            (tag) =>
              `<button class="tag-pill" data-tag="${tag}">${tag}</button>`
          )
          .join("");
      };

      const renderDecision = (decision) => {
        const tagMarkup = renderTags(decision.optional_tags);
        const categoryClass = categoryClasses[decision.category] || categoryClasses.General;
        return `
          <article class="relative ml-12 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
            <span class="absolute -left-8 top-6 h-4 w-4 rounded-full bg-slate-900"></span>
            <div class="flex flex-wrap items-center gap-2">
              <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold ${categoryClass}">
                ${decision.category}
              </span>
              <span class="text-xs text-slate-500">${decision.timestamp}</span>
              <span class="text-xs text-slate-500">by ${decision.author}</span>
            </div>
            <p class="mt-3 text-sm leading-relaxed text-slate-700">${decision.message}</p>
            <div class="mt-4 flex flex-wrap gap-2">${tagMarkup}</div>
          </article>
        `;
      };

      const renderTimeline = () => {
        const filtered = decisions.filter(matchesFilters);
        timeline.innerHTML = filtered.map(renderDecision).join("");

        const parts = [];
        if (activeCategory && activeCategory !== "All") {
          parts.push(`Category: ${activeCategory}`);
        }
        if (activeTag) {
          parts.push(`Tag: ${activeTag}`);
        }
        activeFilters.textContent = parts.length ? `Active filters: ${parts.join(" · ")}` : "";

        document.querySelectorAll(".tag-pill").forEach((button) => {
          button.addEventListener("click", () => {
            activeTag = button.dataset.tag;
            renderTimeline();
          });
        });
      };

      const updateCategory = (category) => {
        activeCategory = category;
        activeTag = null;
        categoryButtons.forEach((button) => {
          button.classList.toggle("ring-2", button.dataset.category === category);
          button.classList.toggle("ring-offset-2", button.dataset.category === category);
        });
        renderTimeline();
      };

      searchInput.addEventListener("input", renderTimeline);
      categoryButtons.forEach((button) => {
        button.addEventListener("click", () => updateCategory(button.dataset.category));
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          activeTag = null;
          updateCategory("All");
          searchInput.value = "";
          renderTimeline();
        }
      });

      renderTimeline();
    </script>
  </body>
</html>
